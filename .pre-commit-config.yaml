repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.3.0
    hooks:
      - id: ruff
        args: [ --fix ]
      - id: ruff-format

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files
      - id: check-json
      - id: debug-statements
      - id: check-ast
      - id: check-merge-conflict

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.9.0
    hooks:
      - id: mypy
        args: [--config-file=nexus_core/pyproject.toml, --explicit-package-bases]
        additional_dependencies: [
          pydantic>=2.13.4,
          types-requests,
          types-psutil,
          click>=8.1.0,
          rich>=13.0.0,
          discord.py>=2.3.0
        ]
        files: ^nexus_core/

  - repo: https://github.com/returntocorp/semgrep
    rev: 'v1.165.0'
    hooks:
      - id: semgrep
        args: ['--config', auto, '--error']
        stages: [pre-push]

  - repo: local
    hooks:
      - id: core-test
        name: core-test
        entry: bash -c "docker build -t nexus-seeker-test -f Dockerfile.test . && docker run --rm nexus-seeker-test python -m pytest tests"
        language: system
        stages: [pre-push]
        always_run: false
        files: ^nexus_core/.*\.py$
        pass_filenames: false

      - id: scraper-test
        name: scraper-test
        entry: bash -c "PYTHONPATH=nexus_edge_scraper nexus_core/.venv/bin/pytest nexus_edge_scraper/tests"
        language: system
        stages: [pre-push]
        always_run: false
        files: ^nexus_edge_scraper/.*\.py$
        pass_filenames: false

      - id: docker-test-commit
        name: docker-test-commit
        entry: bash scripts/docker_test.sh
        language: system
        stages: [pre-commit]
        always_run: false
        files: \.py$
        pass_filenames: false
