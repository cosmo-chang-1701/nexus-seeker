name: Build and Deploy Nexus Seeker (Swarm Zero-Downtime)

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

env:
  # GHCR 映像檔基本路徑
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  # 遠端 Swarm 服務名稱
  SERVICE_NAME: nexus-seeker-service

jobs:
  # --- 第一階段：持續整合 (CI) - 建置並推送映像檔 ---
  build-and-push:
    name: 🏗️ Build and Push Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    outputs:
      deploy_version: ${{ steps.vars.outputs.sha_short }}
      image_tag: ${{ steps.vars.outputs.image_tag }}

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔑 Set Deployment Variables
        id: vars
        run: |
          SHA_SHORT=$(git rev-parse --short HEAD)
          echo "sha_short=${SHA_SHORT}" >> $GITHUB_OUTPUT
          # 映像檔標籤包含 sha 後綴，這是版本化祕密同步的關鍵
          echo "image_tag=sha-${SHA_SHORT}" >> $GITHUB_OUTPUT
          # 轉換映像檔名稱為小寫以符合 Docker 規範
          echo "image_lower=$(echo ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }} | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 🏷️ Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.vars.outputs.image_lower }}
          tags: |
            type=raw,value=${{ steps.vars.outputs.image_tag }}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}
            type=ref,event=tag

      - name: 🚀 Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./nexus_core
          file: ./nexus_core/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # --- 第二階段：持續佈署 (CD) - 遠端 Docker Swarm 滾動更新 ---
  deploy:
    name: 🚢 Deploy to Production (Swarm)
    needs: build-and-push
    # 僅在推送 v* 標籤時觸發佈署
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: 🌐 Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          DISCORD_ADMIN_USER_ID: ${{ secrets.DISCORD_ADMIN_USER_ID }}
          LLM_API_BASE: ${{ secrets.LLM_API_BASE }}
          LLM_MODEL_NAME: ${{ secrets.LLM_MODEL_NAME }}
          API_KEY: ${{ secrets.API_KEY }}
          TUNNEL_URL: ${{ secrets.TUNNEL_URL }}
          FINNHUB_API_KEY: ${{ secrets.FINNHUB_API_KEY }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN }}
        with:
          host: ${{ secrets.DIGITALOCEAN_HOST }}
          username: ${{ secrets.DIGITALOCEAN_USERNAME }}
          key: ${{ secrets.DIGITALOCEAN_SSH_KEY }}
          envs: SERVICE_NAME,DEPLOY_VERSION,IMAGE_TAG,REGISTRY,IMAGE_NAME,DISCORD_TOKEN,DISCORD_ADMIN_USER_ID,LLM_API_BASE,LLM_MODEL_NAME,API_KEY,TUNNEL_URL,FINNHUB_API_KEY,GHCR_TOKEN
          script: |
            # 初始化環境變數
            DEPLOY_VERSION="${{ needs.build-and-push.outputs.deploy_version }}"
            IMAGE_TAG="${{ needs.build-and-push.outputs.image_tag }}"
            IMAGE_LOWER=$(echo $REGISTRY/$IMAGE_NAME | tr '[:upper:]' '[:lower:]')
            FULL_IMAGE="$IMAGE_LOWER:$IMAGE_TAG"

            echo "🚀 開始執行零停機佈署，版本: $DEPLOY_VERSION"
            echo "📦 使用映像檔: $FULL_IMAGE"

            # 1. 檢查並初始化 Docker Swarm (冪等性)
            if ! docker info | grep -q "Swarm: active"; then
              echo "⚠️ 偵測到 Swarm 未啟動，正在初始化..."
              docker swarm init || true
            fi

            # 2. 登入 GHCR
            echo "$GHCR_TOKEN" | docker login $REGISTRY -u "${{ github.actor }}" --password-stdin

            # 3. 處理版本化祕密 (Versioned Secrets Management)
            # 定義需要被版本化的祕密清單 (從環境變數讀取)
            declare -A SECRETS_MAP=(
              ["DISCORD_TOKEN"]="$DISCORD_TOKEN"
              ["DISCORD_ADMIN_USER_ID"]="$DISCORD_ADMIN_USER_ID"
              ["LLM_API_BASE"]="$LLM_API_BASE"
              ["LLM_MODEL_NAME"]="$LLM_MODEL_NAME"
              ["API_KEY"]="$API_KEY"
              ["TUNNEL_URL"]="$TUNNEL_URL"
              ["FINNHUB_API_KEY"]="$FINNHUB_API_KEY"
            )

            # 取得現有服務掛載的祕密資訊 (用於精確移除舊版本)
            CURRENT_SECRETS=$(docker service inspect "$SERVICE_NAME" --format '{{range .Spec.TaskTemplate.ContainerSpec.Secrets}}{{.SecretName}} {{.File.Name}}{{"\n"}}{{end}}' 2>/dev/null || true)
            SECRET_UPDATE_FLAGS=""

            for KEY in "${!SECRETS_MAP[@]}"; do
              NEW_SECRET_NAME="${KEY}_${DEPLOY_VERSION}"
              VALUE="${SECRETS_MAP[$KEY]}"

              # 建立新版本祕密 (若已存在則跳過)
              if ! docker secret ls --format '{{.Name}}' | grep -q "^${NEW_SECRET_NAME}$"; then
                echo "🔑 建立新祕密: $NEW_SECRET_NAME"
                echo "$VALUE" | docker secret create "$NEW_SECRET_NAME" -
              fi

              # 找出目前掛載到該 KEY 的舊祕密名稱
              OLD_SECRET_NAME=$(echo "$CURRENT_SECRETS" | grep " $KEY$" | awk '{print $1}' || true)

              if [ -n "$OLD_SECRET_NAME" ] && [ "$OLD_SECRET_NAME" != "$NEW_SECRET_NAME" ]; then
                echo "♻️ 準備替換祕密: $OLD_SECRET_NAME -> $NEW_SECRET_NAME"
                SECRET_UPDATE_FLAGS="$SECRET_UPDATE_FLAGS --secret-rm $OLD_SECRET_NAME --secret-add source=${NEW_SECRET_NAME},target=${KEY}"
              elif [ -z "$OLD_SECRET_NAME" ]; then
                echo "➕ 準備新增祕密: $NEW_SECRET_NAME"
                SECRET_UPDATE_FLAGS="$SECRET_UPDATE_FLAGS --secret-add source=${NEW_SECRET_NAME},target=${KEY}"
              fi
            done

            # 4. 服務更新與建立 (Zero-Downtime Strategy)
            # 使用更精確的過濾器來尋找現有服務
            if docker service ls --filter "name=$SERVICE_NAME" --format '{{.Name}}' | grep -q "^${SERVICE_NAME}$"; then
              echo "🔄 偵測到服務 $SERVICE_NAME 已存在，執行滾動更新 (start-first)..."
              docker service update \
                --image "$FULL_IMAGE" \
                --user root \
                --with-registry-auth \
                --update-order start-first \
                --update-failure-action rollback \
                --update-monitor 60s \
                --env-add DEPLOYMENT_TIMESTAMP=$(date +%s) \
                --env-add TZ=America/New_York \
                $SECRET_UPDATE_FLAGS \
                "$SERVICE_NAME"
            else
              echo "🆕 建立全新服務: $SERVICE_NAME"
              # 初次建立服務時需要特殊處理祕密掛載
              INIT_SECRET_FLAGS=""
              for KEY in "${!SECRETS_MAP[@]}"; do
                INIT_SECRET_FLAGS="$INIT_SECRET_FLAGS --secret source=${KEY}_${DEPLOY_VERSION},target=${KEY}"
              done

              docker service create \
                --name "$SERVICE_NAME" \
                --user root \
                --with-registry-auth \
                --replicas 1 \
                --update-order start-first \
                --env TZ=America/New_York \
                --env DEPLOYMENT_TIMESTAMP=$(date +%s) \
                $INIT_SECRET_FLAGS \
                "$FULL_IMAGE"
            fi

            # 5. 清理與驗證
            echo "🧹 執行環境清理..."
            # 移除未被使用的舊版本祕密 (排除目前剛建立的版本)
            # 注意：由於 start-first 策略，舊版本可能還在運作中，rm 失敗是正常的
            for KEY in "${!SECRETS_MAP[@]}"; do
              docker secret ls --format "{{.Name}}" | grep "^${KEY}_" | grep -v "$DEPLOY_VERSION" | while read -r OLD_SEC; do
                docker secret rm "$OLD_SEC" 2>/dev/null || echo "⏳ 祕密 $OLD_SEC 仍在使用中，跳過清理"
              done
            done

            # 清理過期映像檔
            docker image prune -af

            echo "✅ 佈署驗證狀態:"
            docker service ls | grep "$SERVICE_NAME"
            docker service ps "$SERVICE_NAME" --no-trunc | head -n 5
